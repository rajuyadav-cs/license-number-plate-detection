{% extends "base.html" %}

{% block content %}
<section class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-4xl text-center">
        
        <p class="mb-4 text-sm sm:text-base text-blue-400 font-semibold tracking-wide">
            YOLO Based ANPR System
        </p>

        <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold mb-6 leading-tight">
            IntelliPlate
        </h1>

        <p class="text-slate-300 text-base sm:text-lg md:text-xl max-w-2xl mx-auto mb-8">
            Automatic Number Plate Recognition System using YOLO, Django and PostgreSQL.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="{% url 'detect' %}"
            class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-semibold text-center">
                Start Detection
            </a>

            <a href="{% url 'vehicle_history' %}"
            class="w-full sm:w-auto border border-slate-600 hover:border-slate-400 px-6 py-3 rounded-xl font-semibold text-center">
                View History
            </a>
        </div>

    </div>
</section>
{% endblock %}
