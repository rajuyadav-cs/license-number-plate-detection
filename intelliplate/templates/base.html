{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliPlate</title>
    {% tailwind_css %}
</head>

<body class="min-h-screen bg-slate-950 text-white">

    <header class="sticky top-0 z-50 border-b border-slate-800 bg-slate-950/90 backdrop-blur">
        <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            
            <a href="{% url 'home' %}" class="text-xl font-bold tracking-tight">
                Intelli<span class="text-blue-500">Plate</span>
            </a>

            <div class="hidden items-center gap-6 md:flex">
                <a href="{% url 'home' %}" class="text-sm text-slate-300 hover:text-white">Home</a>
                <a href="{% url 'detect' %}" class="text-sm text-slate-300 hover:text-white">Detect</a>
                <a href="{% url 'vehicle_history' %}" class="text-sm text-slate-300 hover:text-white">History</a>
                <a href="{% url 'dashboard' %}"
                class="text-sm text-slate-300 hover:text-white">
                Dashboard
                </a>
            </div>

            <a href="#" class="hidden rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold hover:bg-blue-700 md:block">
                Start Detection
            </a>

        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t border-slate-800 py-6">
        <p class="text-center text-sm text-slate-500">
            © 2026 IntelliPlate. YOLO based ANPR System.
        </p>
    </footer>

</body>
</html>
